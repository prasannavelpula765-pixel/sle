{% extends 'users/userhomepage.html' %}
{% block contents %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Evaluation</title>
    <style>
        body {
            background: linear-gradient(45deg, #ff6b6b, #ffcc33);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        .content {
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        .card {
            width: 1000px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            background-color: #fff;
            transition: box-shadow 0.3s ease-in-out;
        }

        .card:hover {
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
        }

        .glow {
            box-shadow: 0 0 20px rgba(225, 253, 14, 0.6);
            background-color: rgb(115, 164, 164);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px; /* Add some space below heading */
        }

        form {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Changed to 2 columns for better layout */
            gap: 20px;
        }

        label {
            font-weight: bold; /* Make labels bold */
        }

        input[type="text"] {
            width: 100%;
            padding: 10px; /* Increased padding for better input appearance */
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%; /* Make button full width */
            margin-top: 10px;
            padding: 15px;
            background-color: #007bff; /* Bootstrap primary color */
            border: none;
            border-radius: 5px;
            color: #fff; /* White text color */
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-left: 220px;

        }

        button:hover {
            background-color: #0056b3; /* Darker shade of primary color on hover */
        }
    </style>
</head>
<body>
    <div class="content">
        <div class="card glow">
            <h2>Prediction Form</h2>
            <h1 style="color: greenyellow;">{{ pred }}</h1>
            <form action="" method="post">
                {% csrf_token %}
                <div>
                    <label for="age1">Age</label>
                    <input type="text" name="age" id="age1" placeholder="Enter Age">
                </div>
                <div>
                    <label for="age2">Sleep Duration</label>
                    <input type="text" name="sleep" id="age2" placeholder="Enter Sleep Duration">
                </div>
                <div>
                    <label for="age3">Physical Activity Level</label>
                    <input type="text" name="activity" id="activity" placeholder="Enter Physical Activity Level">
                </div>
                <div>
                    <label for="age4">Heart Rate</label>
                    <input type="text" name="heartrate" id="heartrate" placeholder="Enter Heart Rate">
                </div>
                <div>
                    <label for="age5">Blood Pressure</label>
                    <input type="text" name="bloodpressure" id="bloodpressure" placeholder="Enter Blood Pressure">
                </div>
                <div>
                    <label for="age6">Daily Steps</label>
                    <input type="text" name="dailysteps" id="dailysteps" placeholder="Enter Daily Steps">
                </div>
                <button type="submit">Predict</button> 
            </form>
        </div>
    </div>

    <!-- Include jQuery and Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>

{% endblock %}
